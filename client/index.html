<!DOCTYPE html>
<html lang="en" data-theme="dark-violet">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f0f11"/>
<meta name="description" content="Collaborative todo lists with real-time sync"/>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json"/>
<title>LilTask — Collaborative Lists</title>

<!-- Custom CRDT (replaces Yjs) -->
<script type="module">
  import * as CRDT from './crdt.mjs';
  window.CRDT = CRDT;
  window.dispatchEvent(new Event('crdt-ready'));
</script>
</head>
<body>

<div id="app">
  <!-- Sidebar backdrop (mobile) -->
  <div id="sidebar-backdrop" onclick="closeSidebar()"></div>
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-logo">✦ <span>LilTask</span></div>

    <div class="sidebar-section">Lists</div>
    <div id="lists-nav"></div>
    <button id="new-list-btn">＋ New list</button>

    <div class="sidebar-nav">
      <div class="sidebar-nav-section">Views</div>
      <button class="nav-btn active" id="nav-lists" onclick="switchView('lists')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="2" y="7.25" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="2" y="11.5" width="8" height="1.5" rx="0.75" fill="currentColor"/></svg>
        Lists
      </button>
      <button class="nav-btn" id="nav-calendar" onclick="switchView('calendar')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M5 2v2M11 2v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2 7h12" stroke="currentColor" stroke-width="1.5"/></svg>
        Calendar
      </button>
      <div class="sidebar-nav-section">Plugins</div>
      <button class="nav-btn" onclick="openPluginsModal()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2h4v3l2 1-1 2-2-1v2l2 1-1 2-2-1v3H6v-3l-2 1-1-2 2-1v-2l-2 1-1-2 2-1V2z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
        Plugins
      </button>
      <div class="sidebar-nav-section">App</div>
      <button class="nav-btn" onclick="openThemesModal()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 2.5C8 2.5 5 5 5 8s3 5.5 3 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.5 8h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Themes
      </button>
      <button class="nav-btn" onclick="openSettingsModal()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Settings
      </button>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">
    <header id="header">
      <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div id="header-title">My List</div>
      <div id="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">offline</span></div>
      <button class="header-btn" onclick="openShareModal()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="12" cy="4" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="4" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 7l4-2M6 9l4 2" stroke="currentColor" stroke-width="1.5"/></svg>
        Share
      </button>
    </header>

    <!-- Todo View -->

<div id="todo-view" class="active">
  <div id="todos-container"></div>

  <div id="todo-bottom">
    <div class="list-progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">0 / 0</div>
    </div>

    <div class="todo-input-wrap">
      <input id="todo-input" placeholder="Add a task…" autocomplete="off" spellcheck="true"/>
        <!---
        Manual Sync isn't necessary as of right now
        In the future it might be to save on compute.
        <button id="sync-btn" onclick="manualSync()" title="Sync now">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5a5.5 5.5 0 0 1 3.9 1.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 1v3.5H14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Sync
        </button>
        --->
        <button id="add-btn" onclick="addTodo()">+</button>
      </div>
    </div>
  </div>

    <!-- Calendar View -->
    <div id="calendar-view">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calNav(-1)">← Prev</button>
        <div class="cal-month-title" id="cal-title"></div>
        <button class="cal-nav-btn" onclick="calNav(1)">Next →</button>
      </div>
      <div class="cal-grid-header" id="cal-header"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>
</div>

<!-- Celebration overlay -->
<div id="celebration"><div class="celebrate-emoji" id="celebrate-emoji"></div></div>

<!-- Modals rendered by JS -->
<div id="modal-root"></div>
<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
