<svg width="256" height="256" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="lilGradient" x1="24" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">

<stop offset="0%" stop-color="#7C3AED"/>

<stop offset="100%" stop-color="#00C2FF"/>

</linearGradient>

<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">

<feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#6D28D9" flood-opacity="0.18"/>

</filter>

</defs>

<g filter="url(#softShadow)">

